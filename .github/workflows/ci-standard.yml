name: CI Standard
on:
  push:
    branches:
    - main
    - staging
    paths-ignore:
    - docs/**
    - '**.md'
    - LICENSE
    - .gitignore
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    paths-ignore:
    - docs/**
    - '**.md'
    - LICENSE
    - .gitignore
  workflow_dispatch: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
