name: CI Standard
on:
  push:
    branches: [main, staging]
    paths-ignore: ["docs/**", "**.md", "LICENSE", ".gitignore"]
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore: ["docs/**", "**.md", "LICENSE", ".gitignore"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Dispatcher: route to self-hosted if available ──────────────────────────
  pick-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \
            --jq '[.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length' \
            2>/dev/null || echo "0")
          if [[ "$ONLINE" -gt 0 ]]; then
            echo "runner=d-sorg-fleet" >> $GITHUB_OUTPUT
            echo "Self-hosted runner online — routing locally"
          else
            echo "runner=ubuntu-latest" >> $GITHUB_OUTPUT
            echo "No self-hosted runner — using GitHub-hosted"
          fi
  quality-gate:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff==0.14.10 mypy==1.13.0 bandit==1.7.7

      - name: Lint (Ruff)
        run: ruff check src/ tests/

      - name: Format Check (ruff-format)
        run: ruff format --check src/ tests/

      - name: Type Check (Mypy)
        run: mypy --ignore-missing-imports src/movement_optimizer/

      - name: Security Scan (bandit)
        run: bandit -r src/movement_optimizer/ -ll -ii

      - name: Security Audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit || echo "::warning::pip-audit found vulnerabilities — review before merging"
        continue-on-error: true

  tests:
    needs: [pick-runner, quality-gate]
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "${{ matrix.python-version }}" }

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Tests
        run: pytest tests/ -v --tb=short --cov=movement_optimizer --cov-report=xml --cov-fail-under=53

      - name: Upload Coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  rust-quality-gate:
    needs: pick-runner
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Check for Rust changes
        id: rust-changes
        run: |
          if [ -f "rust_core/Cargo.toml" ]; then
            echo "has_rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.rust-changes.outputs.has_rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }

      - name: Cache Cargo
        if: steps.rust-changes.outputs.has_rust == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_core/Cargo.lock', 'rust_core/Cargo.toml') }}

      - name: Format Check (rustfmt)
        if: steps.rust-changes.outputs.has_rust == 'true'
        run: cd rust_core && cargo fmt --all -- --check

      - name: Lint (Clippy)
        if: steps.rust-changes.outputs.has_rust == 'true'
        run: cd rust_core && cargo clippy --all-targets -- -D warnings

      - name: Run Rust Tests
        if: steps.rust-changes.outputs.has_rust == 'true'
        run: cd rust_core && cargo test
