# CI dispatch marker 2026-04-10
name: CI Standard
on:
  push:
    branches: [main, staging]
    paths-ignore: ["docs/**", "LICENSE", ".gitignore"]
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore: ["LICENSE", ".gitignore"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pick-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: "echo \"runner=ubuntu-latest\" >> $GITHUB_OUTPUT"
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 xvfb

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1
          python -m venv .ci-venv
          . .ci-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install ruff==0.14.10 mypy==1.13.0 bandit==1.7.7
          echo "$PWD/.ci-venv/bin" >> "$GITHUB_PATH"

      - name: Lint (Ruff)
        run: ruff check src/ tests/

      - name: Format Check (ruff-format)
        run: ruff format --check src/ tests/

      - name: Type Check (Mypy)
        run: mypy --ignore-missing-imports src/movement_optimizer/

      - name: Security Scan (bandit)
        run: python -m bandit -r src/movement_optimizer/ -ll -ii

      - name: Security Audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit || echo "::warning::pip-audit found vulnerabilities — review before merging"
        continue-on-error: true

    needs: pick-runner
  tests:
    needs:
      - pick-runner
      - quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: {python-version: "${{ matrix.python-version }}"}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 xvfb

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1
          python -m venv .ci-venv
          . .ci-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          echo "$PWD/.ci-venv/bin" >> "$GITHUB_PATH"

      - name: Run Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: xvfb-run -a python -m pytest tests/ -v --tb=short --cov=movement_optimizer --cov-report=xml --cov-fail-under=53

      - name: Upload Coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  rust-quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Check for Rust changes
        id: rust-changes
        run: |
          if [ -f "rust_core/Cargo.toml" ]; then
            echo "has_rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.rust-changes.outputs.has_rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with: {components: "rustfmt, clippy"}

      - name: Cache Cargo
        if: steps.rust-changes.outputs.has_rust == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust_core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust_core/Cargo.lock', 'rust_core/Cargo.toml') }}

      - name: Format Check (rustfmt)
        if: steps.rust-changes.outputs.has_rust == 'true'
        run: cd rust_core && cargo fmt --all -- --check

      - name: Lint (Clippy)
        if: steps.rust-changes.outputs.has_rust == 'true'
        run: cd rust_core && cargo clippy --all-targets -- -D warnings

      - name: Run Rust Tests
        if: steps.rust-changes.outputs.has_rust == 'true'
        run: cd rust_core && cargo test
    needs: pick-runner
