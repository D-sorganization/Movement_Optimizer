name: Nightly Tests
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: d-sorg-fleet
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          cache: "pip"
          python-version: "3.11"

      - name: Install System Dependencies
        run: |
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            run_apt_with_lock_retry() {
              local attempt
              local status
              for attempt in 1 2 3 4 5; do
                if "$@"; then
                  return 0
                fi
                status=$?
                if ! sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then
                  return "$status"
                fi
                echo "dpkg lock-frontend is busy; retrying in 30 seconds (attempt ${attempt}/5)."
                sleep 30
              done
              return "$status"
            }

            run_apt_with_lock_retry sudo apt-get update
            run_apt_with_lock_retry sudo apt-get install -y libegl1 xvfb
          fi

      - name: Install
        run: |
          python -m venv .nightly-venv
          . .nightly-venv/bin/activate
          export PIP_NO_CACHE_DIR=1
          export PIP_DEFAULT_TIMEOUT=120
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          echo "$PWD/.nightly-venv/bin" >> "$GITHUB_PATH"

      - name: Nightly full default-lane (excludes live_simulation only)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python -m pytest -m "not live_simulation" --durations=20

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly tests failed: ${context.runId}`,
              body: `Nightly run failed. See https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ci-failure', 'nightly']
            });
