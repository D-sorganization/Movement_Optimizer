name: Stale Cleanup
on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
  workflow_dispatch:

jobs:
  # ── Dispatcher: route to self-hosted if available ──────────────────────────
  pick-runner:
    runs-on: self-hosted
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: |
          ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \
            --jq '[.runners[] | select(.status == "online") | select(.labels[].name == "d-sorg-fleet")] | length' \
            2>/dev/null || echo "0")
          if [[ "$ONLINE" -gt 0 ]]; then
            mkdir -p "$(dirname "$GITHUB_OUTPUT")"
            mkdir -p "$(dirname "$GITHUB_OUTPUT")"
            echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
            echo "Self-hosted runner online — routing locally"
          else
            mkdir -p "$(dirname "$GITHUB_OUTPUT")"
            mkdir -p "$(dirname "$GITHUB_OUTPUT")"
            echo "runner=d-sorg-fleet" >> "$GITHUB_OUTPUT"
            echo "No self-hosted runner — using cloud runner (blocked)"
          fi
  stale:
    needs: pick-runner
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.RUNNER_CHECK_TOKEN }}

          # Stale issues
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please comment or remove the stale label.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. Feel free to
            reopen if this is still relevant.

          # Stale PRs
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further activity occurs.
            Please rebase and update if this PR is still needed.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity. Feel free
            to reopen with updated changes.

          # Exemptions
          exempt-issue-labels: "pinned,priority:high,in-progress"
          exempt-pr-labels: "pinned,priority:high,in-progress"
          exempt-all-milestones: true

          # Limits
          operations-per-run: 60
