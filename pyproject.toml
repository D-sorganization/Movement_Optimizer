[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "movement-optimizer"
version = "1.0.0"
description = "Biomechanics trajectory optimizer for barbell exercises using Lagrangian inverse dynamics"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24,<2.0",
    "scipy>=1.10,<2.0",
    "matplotlib>=3.7,<4.0",
    "PyQt6>=6.5,<7.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "hypothesis>=6.0",
    "tomli>=2.0; python_version < '3.11'",
    "PyYAML>=6.0",
]
rust = [
    "maturin>=1.5",
]

[project.scripts]
movement-optimizer = "movement_optimizer.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "SIM", "RUF",
]
ignore = [
    "E501",
    "N802",
    "N803",
    "N806",
]

[tool.ruff.lint.isort]
known-first-party = ["movement_optimizer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "tests"]
addopts = "-v --tb=short -p no:xvfb"

[tool.mypy]
ignore_missing_imports = true
