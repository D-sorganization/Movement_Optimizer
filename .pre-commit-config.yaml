repos:
  # Ruff - Fast Python linter with auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        name: "ruff (lint + fix)"
        args: ["--fix", "--exit-non-zero-on-fix"]
        types: [python]
        exclude: ^(\.github/|docs/|.*\.md$)
      - id: ruff-format
        name: "ruff format"
        types: [python]
        exclude: ^(\.github/|docs/|.*\.md$)

  - repo: local
    hooks:
      - id: no-wildcard-imports
        name: "no wildcard imports"
        entry: "from .* import \\*"
        language: pygrep
        types: [python]
        exclude: ^(tests/|\.github/)
      - id: no-debug-statements
        name: "no debug statements"
        entry: "(?:^|\\s)(breakpoint\\(|import pdb|pdb\\.set_trace)"
        language: pygrep
        types: [python]
        exclude: ^(tests/|\.github/)
      - id: no-print-in-src
        name: "no print() in src (use logging)"
        entry: "^\\s*print\\("
        language: pygrep
        files: ^src/
        exclude: ^(src/.*/__main__\.py|tests/|\.github/)

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: "prettier (yaml/json/md)"
        types_or: [yaml, markdown, json]
        exclude: '(\.py|package-lock\.json|\.ipynb)$'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: "mypy (type check)"
        stages: [pre-push]
        additional_dependencies: [types-requests, types-PyYAML, numpy]
        args: [--ignore-missing-imports]
        types: [python]
        files: ^src/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: "bandit (security scan)"
        stages: [pre-push]
        args: ["-ll", "-ii"]
        files: ^src/
        types: [python]

  - repo: local
    hooks:
      - id: pytest-unit
        name: "pytest (unit tests)"
        stages: [pre-push]
        entry: python3 -m pytest tests/ -x -q --tb=short
        language: system
        pass_filenames: false
        types: [python]

default_language_version:
  python: python3.12

exclude: |
  (?x)^(
    \.git/|
    __pycache__/|
    \.mypy_cache/|
    \.ruff_cache/|
    \.pytest_cache/|
    \.venv/|
    venv/|
    build/|
    dist/|
    target/|
    .*\.egg-info/
  )

fail_fast: false

ci:
  autofix_commit_msg: "style: auto-fix from pre-commit hooks"
  autofix_prs: true
  autoupdate_branch: "main"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  skip: [pytest-unit, bandit, mypy]
